<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referee Whiteboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* ── Toolbars ─────────────────────────────────────────── */
  #toolbar-top,
  #toolbar-bottom {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    background: #1e1e1e;
    width: 100%;
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
  }

  #toolbar-bottom-content {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    overflow-x: auto;
    overflow-y: hidden;
    width: 100%;
  }

  #toolbar-bottom-content .toolbar-group {
    justify-content: center;
    align-self: stretch;
  }

  #toolbar-bottom-content .toolbar-group:last-child { border-right: none; }
  #toolbar-top::-webkit-scrollbar,
  #toolbar-bottom::-webkit-scrollbar { height: 3px; }
  #toolbar-top::-webkit-scrollbar-track,
  #toolbar-bottom::-webkit-scrollbar-track { background: #1e1e1e; }
  #toolbar-top::-webkit-scrollbar-thumb,
  #toolbar-bottom::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  #toolbar-top  { border-bottom: 1px solid #333; }
  #toolbar-bottom { border-top: 1px solid #333; }

  #toolbar-bottom[data-mode="draw"] .select-only { display: none; }
  #toolbar-bottom[data-mode="select"] .draw-only { display: none; }

  .toolbar-group {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 16px;
    border-right: 1px solid #333;
    gap: 6px;
    flex-shrink: 0;
  }
  .toolbar-group:last-child { border-right: none; }

  .toolbar-logo {
    padding: 0 18px;
    background: #2a2a2a;
    border-right: 1px solid #1a1a1a;
  }
  .toolbar-logo-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #fdfdfd;
    white-space: nowrap;
  }

  .toolbar-group .section-title { margin-bottom: 2px; }

  .section {
    padding: 10px 10px 6px;
    border-bottom: 1px solid #333;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 7px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 10px;
    border: 1px solid #333;
    border-radius: 5px;
    background: #2a2a2a;
    color: #e0e0e0;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    gap: 4px;
  }

  .btn:hover { background: #383838; border-color: #555; }

  .btn.active {
    background: #444;
    border-color: #e94560;
    color: #fff;
    box-shadow: 0 0 6px rgba(233, 69, 96, 0.4);
  }

  .btn-full { width: 100%; margin-bottom: 4px; }

  .btn-mode { min-width: 80px; background: #1e1e1e; border-color: #2a2a2a; }
  .btn-mode:hover { background: #282828; border-color: #444; }

  .mode-row { display: flex; gap: 5px; }

  .btn-team-a {
    background: #1565C0;
    border-color: #1976D2;
    color: #fff;
  }
  .btn-team-a:hover { background: #1976D2; }
  .btn-team-a.active { background: #0D47A1; border-color: #FFD700; box-shadow: 0 0 6px rgba(255,215,0,0.5); }

  .btn-team-b {
    background: #C62828;
    border-color: #D32F2F;
    color: #fff;
  }
  .btn-team-b:hover { background: #D32F2F; }
  .btn-team-b.active { background: #B71C1C; border-color: #FFD700; box-shadow: 0 0 6px rgba(255,215,0,0.5); }

  .btn-ref {
    background: #111;
    border-color: #fff;
    color: #fff;
    font-weight: 700;
  }
  .btn-ref:hover { opacity: 0.85; }
  .btn-ref.active { border-color: #FFD700; box-shadow: 0 0 6px rgba(255,215,0,0.6); }

  .btn-ball {
    background: #8B4513;
    border-color: #A0522D;
    color: #fff;
  }
  .btn-ball:hover { background: #A0522D; }
  .btn-ball.active { background: #6B3410; border-color: #FFD700; box-shadow: 0 0 6px rgba(255,215,0,0.5); }

  .btn-danger {
    background: #4a1010;
    border-color: #7a1f1f;
    color: #ff8080;
  }
  .btn-danger:hover { background: #6a1515; }

  .btn-sm { padding: 4px 12px; font-size: 11px; height: 28px; }

  .number-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
  }

  .number-row label {
    font-size: 11px;
    color: #aaa;
    white-space: nowrap;
  }

  .number-input {
    width: 55px;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 12px;
    padding: 3px 6px;
    outline: none;
  }
  .number-input:focus { border-color: #333; }

  .ref-grid {
    display: grid;
    grid-template-columns: repeat(4, auto);
    grid-template-rows: repeat(2, auto);
    grid-auto-flow: row;
    gap: 6px;
  }

  /* Drawing controls */
  .swatch-row {
    display: flex;
    gap: 5px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid #444;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .swatch:hover { border-color: #555; }
  .swatch.active { border-color: #e94560; box-shadow: 0 0 6px rgba(233, 69, 96, 0.4); }

  .width-row {
    display: flex;
    gap: 5px;
    margin-bottom: 6px;
    align-items: center;
  }

  .width-btn {
    flex: 1;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .width-preview {
    background: #e0e0e0;
    border-radius: 50%;
  }

  select.sidebar-select {
    width: 100%;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 12px;
    padding: 5px 6px;
    outline: none;
    margin-bottom: 5px;
    cursor: pointer;
  }
  select.sidebar-select:focus { border-color: #333; }

  /* ── Field area ───────────────────────────────────────── */
  #field-wrapper {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-image: url('./grass-tile.png');
    background-repeat: repeat;
    background-size: 300px;
  }

  #field-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  #token-layer {
    position: absolute;
    pointer-events: auto;
    z-index: 20;
  }

  #draw-canvas {
    position: absolute;
    z-index: 10;
    pointer-events: none;
    touch-action: none;
  }

  /* Placement cursor */
  body.placing #field-wrapper { cursor: crosshair; }
  body.drawing-mode #field-wrapper { cursor: crosshair; }

  /* ── Tokens ───────────────────────────────────────────── */
  .token {
    position: absolute;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    user-select: none;
    cursor: grab;
    border: 2px solid rgba(255,255,255,0.3);
    transition: box-shadow 0.1s;
    touch-action: none;
  }

  .token:hover {
    box-shadow: 0 0 0 3px rgba(255,215,0,0.6);
    z-index: 50 !important;
  }

  .token.dragging {
    cursor: grabbing;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.8);
    z-index: 200 !important;
  }

  .token-a {
    background: #1565C0;
    color: #fff;
  }

  .token-b {
    background: #C62828;
    color: #fff;
  }

  .token-ref {
    background: #111;
    border: 2px solid #fff !important;
    color: #fff;
    font-size: 11px;
  }

  .token-ball {
    background: transparent;
    border-color: transparent !important;
    box-shadow: none !important;
    width: 30px;
    height: 21px;
  }
  .token-ball svg {
    width: 100%;
    height: 100%;
  }

  .token-flag {
    background: #FFD700;
    border-color: #B8860B !important;
    color: #5a3e00;
    font-size: 14px;
    width: 22px;
    height: 22px;
    border-radius: 3px;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }

  .btn-flag {
    background: #7a6000;
    border-color: #B8860B;
    color: #FFD700;
    font-weight: 700;
  }
  .btn-flag:hover { background: #9a7800; }
  .btn-flag.active { background: #5a4400; border-color: #FFD700; box-shadow: 0 0 6px rgba(255,215,0,0.7); }

  /* Inline edit input on token */
  .token-edit-input {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    background: rgba(0,0,0,0.85);
    color: #FFD700;
    border: 2px solid #FFD700;
    outline: none;
    z-index: 300;
    padding: 0;
  }

</style>
</head>
<body>

<div id="app">

  <!-- ── Top toolbar ──────────────────────────────────────────── -->
  <div id="toolbar-top">

    <div class="toolbar-group toolbar-logo">
      <span class="toolbar-logo-text">⚑ Ref Whiteboard</span>
    </div>

    <div class="toolbar-group" style="margin-left:auto; border-left:1px solid #333">
      <div class="section-title">Scenarios</div>
      <div class="mode-row">
        <button class="btn btn-sm" onclick="saveScenario()">⬇ Save Scenario</button>
        <button class="btn btn-sm" onclick="loadScenarioClick()">⬆ Load Scenario</button>
        <input type="file" id="load-file" accept=".json" style="display:none" onchange="loadScenarioFile(this)">
      </div>
    </div>

    <div class="toolbar-group">
      <div class="section-title">Actions</div>
      <div class="mode-row">
        <button class="btn btn-sm" onclick="undo()">↩ Undo</button>
        <button class="btn btn-sm" onclick="redo()">↪ Redo</button>
<button class="btn btn-danger btn-sm" onclick="resetEverything()">⟳ Reset</button>
      </div>
    </div>

  </div>

  <!-- ── Field (unchanged) ────────────────────────────────── -->
  <div id="field-wrapper">
    <img id="field-img" src="./field-ifaf.svg" alt="Football Field" draggable="false">
    <div id="token-layer"></div>
    <canvas id="draw-canvas"></canvas>
  </div>

  <!-- ── Bottom toolbar ───────────────────────────────────── -->
  <div id="toolbar-bottom" data-mode="select">

    <div id="toolbar-bottom-content">

      <div class="toolbar-group" style="background:#2a2a2a;">
        <div class="section-title">Mode</div>
        <button class="btn btn-mode active" id="btn-select" onclick="setMode('select')">⬆ Select</button>
        <button class="btn btn-mode" id="btn-draw" onclick="setMode('draw')">✏ Draw</button>
      </div>

      <div class="toolbar-group select-only">
        <div class="section-title">Teams</div>
        <button class="btn btn-team-a placement-btn btn-sm" id="btn-place-a" onclick="activatePlacement('A')">Add Team A player</button>
        <button class="btn btn-team-b placement-btn btn-sm" id="btn-place-b" onclick="activatePlacement('B')">Add Team B player</button>
      </div>

      <div class="toolbar-group select-only">
        <div class="section-title">Items</div>
        <button class="btn btn-ball placement-btn btn-sm" id="btn-place-ball" onclick="activatePlacement('ball')">Move Ball</button>
        <button class="btn btn-flag placement-btn btn-sm" id="btn-place-flag" onclick="activatePlacement('flag')">Place Flag</button>
      </div>

      <div class="toolbar-group select-only">
        <div class="section-title">Officials</div>
        <div class="ref-grid" id="ref-grid"></div>
      </div>

      <div class="toolbar-group select-only">
        <div class="section-title">Trace</div>
        <button class="btn btn-sm" id="btn-trace" onclick="toggleTraceMode()">✦ Trace</button>
      </div>

      <div class="toolbar-group draw-only">
        <div class="section-title">Colour</div>
        <div class="swatch-row" id="swatch-row" style="margin-bottom:0; flex-wrap:wrap; width:168px"></div>
      </div>

      <div class="toolbar-group draw-only">
        <div class="section-title">Weight</div>
        <div class="width-row" id="width-row" style="margin-bottom:0"></div>
        <button class="btn btn-sm" onclick="clearDrawings()">⌫ Clear</button>
      </div>

    </div>

  </div>

</div>


<script>
// ── State ──────────────────────────────────────────────────
const state = {
  mode: 'select',
  placementType: null,
  tokens: [],
  strokes: [],
  history: [],
  future: [],
  currentStroke: null,
  drawing: false,
  dragging: null,
  traceMode: false,
  traces: [],
  currentTrace: null,
  draw: { color: '#ffffff', width: 5 },
  field: { x: 0, y: 0, w: 0, h: 0 },
  penDetected: false,
  penDetectedTimer: null,
};

let _resizeTimer = null;
let _nextId = 1;
const MAX_FUTURE = 20;

// ── DOM refs ───────────────────────────────────────────────
const fieldWrapper = document.getElementById('field-wrapper');
const fieldImg     = document.getElementById('field-img');
const tokenLayer   = document.getElementById('token-layer');
const canvas       = document.getElementById('draw-canvas');

// ── Officials list ─────────────────────────────────────────
const OFFICIALS = ['R', 'U', 'D', 'L', 'B', 'S', 'F', 'C'];

// ── Drawing colours & widths ───────────────────────────────
const DRAW_COLORS = [
  { color: '#ffffff', label: 'White' },
  { color: '#222222', label: 'Black' },
  { color: '#FFD700', label: 'Yellow' },
  { color: '#2196F3', label: 'Blue' },
  { color: '#F44336', label: 'Red' },
  { color: '#FF6B00', label: 'Orange' },
  { color: '#4CAF50', label: 'Green' },
  { color: '#9C27B0', label: 'Purple' },
  { color: '#00BCD4', label: 'Cyan' },
  { color: '#E040FB', label: 'Magenta' },
];
const DRAW_WIDTHS = [2, 5, 10];

// ── Init ────────────────────────────────────────────────────
function init() {
  buildRefGrid();
  buildSwatches();
  buildWidthBtns();

  // Image load
  if (fieldImg.complete && fieldImg.naturalWidth > 0) {
    requestAnimationFrame(measureField);
  }
  fieldImg.addEventListener('load', () => requestAnimationFrame(measureField));

  // Resize
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      measureField();
    }, 100);
  });

  // Canvas drawing events
  canvas.addEventListener('pointerdown',  onCanvasPointerDown);
  canvas.addEventListener('pointermove',  onCanvasPointerMove);
  canvas.addEventListener('pointerup',    onCanvasPointerUp);
  canvas.addEventListener('pointerleave', onCanvasPointerLeave);
  canvas.addEventListener('pointercancel', onCanvasPointerLeave);

  // Field click (for placement)
  fieldWrapper.addEventListener('click', onFieldClick);

  // Global pointer events for drag
  document.addEventListener('pointermove', onDocPointerMove);
  document.addEventListener('pointerup',   onDocPointerUp);

  // Undo shortcut
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
      e.preventDefault();
      undo();
    } else if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
      e.preventDefault();
      redo();
    }
  });

}

// ── Measure field ──────────────────────────────────────────
function measureField() {
  const wRect = fieldWrapper.getBoundingClientRect();
  const iRect = fieldImg.getBoundingClientRect();
  state.field.x = iRect.left - wRect.left;
  state.field.y = iRect.top  - wRect.top;
  state.field.w = iRect.width;
  state.field.h = iRect.height;
  resizeOverlays();
  repositionAllTokens();
  redrawCanvas();
}

// ── Overlays ───────────────────────────────────────────────
function resizeOverlays() {
  const { x, y, w, h } = state.field;
  [tokenLayer, canvas].forEach(el => {
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
  });
  canvas.width  = Math.round(w);
  canvas.height = Math.round(h);
}

// ── Trace mode ──────────────────────────────────────────────
function toggleTraceMode() {
  state.traceMode = !state.traceMode;
  document.getElementById('btn-trace').classList.toggle('active', state.traceMode);
}

function traceColorFor(team) {
  if (team === 'A')    return '#64B5F6';
  if (team === 'B')    return '#E57373';
  if (team === 'ref')  return 'rgba(255, 215, 0, 0.9)';
  if (team === 'flag') return 'rgba(255, 215, 0, 0.7)';
  return '#C49A6C'; // ball
}

// ── Mode ────────────────────────────────────────────────────
function setMode(mode) {
  state.mode = mode;
  state.placementType = null;
  clearPlacementHighlight();

  document.getElementById('btn-select').classList.toggle('active', mode === 'select');
  document.getElementById('btn-draw').classList.toggle('active', mode === 'draw');
  document.getElementById('toolbar-bottom').dataset.mode = mode;

  if (mode === 'draw') {
    canvas.style.zIndex = '30';
    canvas.style.pointerEvents = 'auto';
    tokenLayer.style.pointerEvents = 'none';
    document.body.classList.add('drawing-mode');
    document.body.classList.remove('placing');
  } else {
    canvas.style.zIndex = '10';
    canvas.style.pointerEvents = 'none';
    tokenLayer.style.pointerEvents = 'auto';
    document.body.classList.remove('drawing-mode');
  }
}

// ── Placement ──────────────────────────────────────────────
function activatePlacement(type) {
  if (state.mode === 'draw') setMode('select');

  let label = '';
  if (type === 'A' || type === 'B') label = '1';
  else if (type === 'ball') label = '';
  else if (type === 'flag') label = '';
  else if (OFFICIALS.includes(type)) {
    label = type;
    type = 'ref';
  }

  const key = type === 'ball' ? 'ball' : type + (label ? ':' + label : '');

  if (state.placementType && state.placementType._key === key) {
    // Deselect
    state.placementType = null;
    clearPlacementHighlight();
    document.body.classList.remove('placing');
    return;
  }

  state.placementType = { team: type, label, _key: key };
  clearPlacementHighlight();
  highlightPlacementButton(type, label);
  document.body.classList.add('placing');
}

function activateOfficialPlacement(officialLabel) {
  if (state.mode === 'draw') setMode('select');

  const type = 'ref';
  const label = officialLabel;
  const key = 'ref:' + label;

  if (state.placementType && state.placementType._key === key) {
    state.placementType = null;
    clearPlacementHighlight();
    document.body.classList.remove('placing');
    return;
  }

  state.placementType = { team: type, label, _key: key };
  clearPlacementHighlight();

  // Highlight the specific ref button
  document.querySelectorAll('.btn-ref').forEach(b => {
    if (b.dataset.official === officialLabel) b.classList.add('active');
  });

  document.body.classList.add('placing');
}

function clearPlacementHighlight() {
  document.querySelectorAll('.placement-btn').forEach(b => b.classList.remove('active'));
}

function highlightPlacementButton(team, label) {
  if (team === 'A') document.getElementById('btn-place-a').classList.add('active');
  else if (team === 'B') document.getElementById('btn-place-b').classList.add('active');
  else if (team === 'ball') document.getElementById('btn-place-ball').classList.add('active');
  else if (team === 'flag') document.getElementById('btn-place-flag').classList.add('active');
}

// ── Field click (placement) ─────────────────────────────────
function onFieldClick(e) {
  if (!state.placementType) return;
  if (state.dragging) return;
  if (state.justDragged) { state.justDragged = false; return; }
  if (state.mode === 'draw') return;
  if (e.target.classList.contains('token')) return;

  const { x, y, w, h } = state.field;
  const wRect = fieldWrapper.getBoundingClientRect();
  const xPx = e.clientX - wRect.left - x;
  const yPx = e.clientY - wRect.top  - y;
  const xFrac = Math.max(0, Math.min(1, xPx / w));
  const yFrac = Math.max(0, Math.min(1, yPx / h));

  placeToken(xFrac, yFrac, state.placementType.team, state.placementType.label);

  if (state.placementType.team === 'ref') {
    state.placementType = null;
    clearPlacementHighlight();
    document.body.classList.remove('placing');
  }
}

// ── Place token ────────────────────────────────────────────
function placeToken(xFrac, yFrac, team, label) {
  // Ball uniqueness
  let replacedToken = null;
  if (team === 'ball') {
    const existing = state.tokens.find(t => t.team === 'ball');
    if (existing) { replacedToken = existing; removeToken(existing); }
  }

  const token = { id: _nextId++, team, label, xFrac, yFrac, el: null };
  const el = createTokenEl(token);
  token.el = el;
  state.tokens.push(token);
  tokenLayer.appendChild(el);
  repositionToken(token);

  if (replacedToken) {
    state.history.push({ type: 'replace-ball', removedToken: replacedToken, placedToken: token });
  } else {
    state.history.push({ type: 'place', token });
  }
  state.future = [];

  return token;
}

function createTokenEl(token) {
  const el = document.createElement('div');
  el.className = 'token token-' + (token.team === 'ball' ? 'ball' : token.team === 'flag' ? 'flag' : token.team.toLowerCase());
  el.classList.add('placement-btn');
  if (token.team === 'flag') {
    el.textContent = '⚑';
  } else if (token.team === 'ball') {

  el.addEventListener('contextmenu', e => {
    e.preventDefault();

  el.addEventListener('dblclick', e => {

    }

function repositionToken(token) {
  const { w, h } = state.field;
  token.el.style.left = (token.xFrac * w) + 'px';
  token.el.style.top  = (token.yFrac * h) + 'px';
}

function repositionAllTokens() {
  state.tokens.forEach(repositionToken);
}

function removeToken(token) {
  token.el.remove();
  const idx = state.tokens.indexOf(token);
  if (idx !== -1) state.tokens.splice(idx, 1);
}

// ── Inline label editing ────────────────────────────────────
function editTokenLabel(token) {
  const input = document.createElement('input');
  input.type = 'number';
  input.min = '0';
  input.max = '99';
  input.value = token.label;
  input.className = 'token-edit-input';

  const { w, h } = state.field;
  input.style.left = (token.xFrac * w) + 'px';
  input.style.top  = (token.yFrac * h) + 'px';

  tokenLayer.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    let val = parseInt(input.value, 10);
    if (isNaN(val)) val = 0;
    val = Math.max(0, Math.min(99, val));
    token.label = String(val);
    token.el.textContent = token.label;
    input.remove();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.remove(); }
  });
  input.addEventListener('blur', commit);
}

// ── Dragging ───────────────────────────────────────────────
function beginDrag(e, token) {
  if (state.mode !== 'select') return;
  e.preventDefault();
  state.dragging = {
    token,
    startPointerX: e.clientX,
    startPointerY: e.clientY,
    startXFrac: token.xFrac,
    startYFrac: token.yFrac,
  };
  token.el.classList.add('dragging');
  document.body.style.cursor = 'grabbing';

  if (state.traceMode) {
    state.currentTrace = {
      color: traceColorFor(token.team),
      width: 4,
      points: [{ xFrac: token.xFrac, yFrac: token.yFrac }],
    };
    state.traces.push(state.currentTrace);
  }
}

function onDocPointerMove(e) {
  if (!state.dragging) return;
  const { token, startPointerX, startPointerY, startXFrac, startYFrac } = state.dragging;
  const { w, h } = state.field;
  const dx = e.clientX - startPointerX;
  const dy = e.clientY - startPointerY;
  token.xFrac = Math.max(0, Math.min(1, startXFrac + dx / w));
  token.yFrac = Math.max(0, Math.min(1, startYFrac + dy / h));
  repositionToken(token);

  if (state.currentTrace) {
    const prev = state.currentTrace.points[state.currentTrace.points.length - 1];
    state.currentTrace.points.push({ xFrac: token.xFrac, yFrac: token.yFrac });
    const ctx = getCtx();
    ctx.strokeStyle = state.currentTrace.color;
    ctx.lineWidth   = state.currentTrace.width;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(prev.xFrac * canvas.width, prev.yFrac * canvas.height);
    ctx.lineTo(token.xFrac * canvas.width, token.yFrac * canvas.height);
    ctx.stroke();
  }
}

function onDocPointerUp(e) {
  if (!state.dragging) return;
  const { token, startXFrac, startYFrac } = state.dragging;
  const moved = token.xFrac !== startXFrac || token.yFrac !== startYFrac;
  if (moved) {
    state.history.push({
      type: 'move', token,
      oldXFrac: startXFrac, oldYFrac: startYFrac,
      newXFrac: token.xFrac, newYFrac: token.yFrac,
      trace: state.currentTrace,
    });
    state.future = [];
  }
  token.el.classList.remove('dragging');
  state.dragging = null;
  state.currentTrace = null;
  state.justDragged = true;
  document.body.style.cursor = '';
}

// ── Pen detection ───────────────────────────────────────────
function onPenActivity() {
  state.penDetected = true;
  clearTimeout(state.penDetectedTimer);
  state.penDetectedTimer = setTimeout(() => { state.penDetected = false; }, 3000);
}

// ── Canvas drawing ──────────────────────────────────────────
function getCtx() { return canvas.getContext('2d'); }

function onCanvasPointerDown(e) {
  if (state.mode !== 'draw') return;
  if (e.pointerType === 'pen') onPenActivity();
  // Palm rejection: if pen is active, ignore finger touches
  if (state.penDetected && e.pointerType === 'touch') return;
  // Ignore secondary pointers (multi-touch)
  if (state.drawing) return;
  canvas.setPointerCapture(e.pointerId);
  state.drawing = true;
  const pt = canvasPt(e);
  state.currentStroke = {
    color: state.draw.color,
    width: state.draw.width,
    points: [pt],
  };
  const ctx = getCtx();
  ctx.beginPath();
  ctx.moveTo(pt.xFrac * canvas.width, pt.yFrac * canvas.height);
}

function onCanvasPointerMove(e) {
  if (!state.drawing || !state.currentStroke) return;
  if (e.pointerType === 'pen') onPenActivity();
  if (state.penDetected && e.pointerType === 'touch') return;
  const pt = canvasPt(e);
  state.currentStroke.points.push(pt);

  const ctx = getCtx();
  ctx.strokeStyle = state.currentStroke.color;
  ctx.lineWidth   = state.currentStroke.width;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.lineTo(pt.xFrac * canvas.width, pt.yFrac * canvas.height);
  ctx.stroke();
}

function onCanvasPointerUp(e) {
  commitStroke();
}

function onCanvasPointerLeave(e) {
  if (state.drawing) commitStroke();
}

function commitStroke() {
  if (!state.drawing || !state.currentStroke) return;
  if (state.currentStroke.points.length > 1) {
    state.strokes.push(state.currentStroke);
    state.history.push({ type: 'stroke', stroke: state.currentStroke });
    state.future = [];
  }
  state.drawing = false;
  state.currentStroke = null;
}

function canvasPt(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    xFrac: Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)),
    yFrac: Math.max(0, Math.min(1, (e.clientY - rect.top)  / rect.height)),
  };
}

function redrawCanvas() {
  const ctx = getCtx();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const w = canvas.width;
  const h = canvas.height;

  state.strokes.forEach(stroke => {
    if (stroke.points.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth   = stroke.width;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.moveTo(stroke.points[0].xFrac * w, stroke.points[0].yFrac * h);
    for (let i = 1; i < stroke.points.length; i++) {
      ctx.lineTo(stroke.points[i].xFrac * w, stroke.points[i].yFrac * h);
    }
    ctx.stroke();
  });

  state.traces.forEach(stroke => {
    if (stroke.points.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth   = stroke.width;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.moveTo(stroke.points[0].xFrac * w, stroke.points[0].yFrac * h);
    for (let i = 1; i < stroke.points.length; i++) {
      ctx.lineTo(stroke.points[i].xFrac * w, stroke.points[i].yFrac * h);
    }
    ctx.stroke();
  });
}

function undo() {
  const entry = state.history.pop();
  if (!entry) return;
  state.future.push(entry);
  if (state.future.length > MAX_FUTURE) state.future.shift();

  if (entry.type === 'move') {
    entry.token.xFrac = entry.oldXFrac;
    entry.token.yFrac = entry.oldYFrac;
    repositionToken(entry.token);
    if (entry.trace) { state.traces.pop(); redrawCanvas(); }
  } else if (entry.type === 'place') {
    removeToken(entry.token);
  } else if (entry.type === 'replace-ball') {
    removeToken(entry.placedToken);
    state.tokens.push(entry.removedToken);
    tokenLayer.appendChild(entry.removedToken.el);
    repositionToken(entry.removedToken);
  } else if (entry.type === 'stroke') {
    state.strokes.pop();
    redrawCanvas();
  } else if (entry.type === 'remove') {
    state.tokens.push(entry.token);
    tokenLayer.appendChild(entry.token.el);
    repositionToken(entry.token);
  }
}

function redo() {
  const entry = state.future.pop();
  if (!entry) return;
  state.history.push(entry);

  if (entry.type === 'move') {
    entry.token.xFrac = entry.newXFrac;
    entry.token.yFrac = entry.newYFrac;
    repositionToken(entry.token);
    if (entry.trace) { state.traces.push(entry.trace); redrawCanvas(); }
  } else if (entry.type === 'place') {
    state.tokens.push(entry.token);
    tokenLayer.appendChild(entry.token.el);
    repositionToken(entry.token);
  } else if (entry.type === 'replace-ball') {
    removeToken(entry.removedToken);
    state.tokens.push(entry.placedToken);
    tokenLayer.appendChild(entry.placedToken.el);
    repositionToken(entry.placedToken);
  } else if (entry.type === 'stroke') {
    state.strokes.push(entry.stroke);
    redrawCanvas();
  } else if (entry.type === 'remove') {
    removeToken(entry.token);
  }
}

function clearDrawings() {
  state.strokes = [];
  state.traces = [];
  redrawCanvas();
}

// ── Sidebar builders ────────────────────────────────────────
function buildRefGrid() {
  const grid = document.getElementById('ref-grid');
  OFFICIALS.forEach(off => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-ref btn-sm placement-btn';
    btn.textContent = off;
    btn.dataset.official = off;
    btn.onclick = () => activateOfficialPlacement(off);
    grid.appendChild(btn);
  });
}

function buildSwatches() {
  const row = document.getElementById('swatch-row');
  DRAW_COLORS.forEach(({ color, label }, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i === 0 ? ' active' : '');
    sw.style.background = color;
    sw.title = label;
    sw.onclick = () => {
      state.draw.color = color;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      setMode('draw');
    };
    row.appendChild(sw);
  });
}

function buildWidthBtns() {
  const row = document.getElementById('width-row');
  DRAW_WIDTHS.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn width-btn' + (i === 1 ? ' active' : '');
    btn.title = w + 'px';

    const preview = document.createElement('div');
    preview.className = 'width-preview';
    preview.style.width  = Math.max(4, w * 1.5) + 'px';
    preview.style.height = Math.max(4, w * 1.5) + 'px';
    btn.appendChild(preview);

    btn.onclick = () => {
      state.draw.width = w;
      document.querySelectorAll('.width-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    row.appendChild(btn);
  });
}

// ── Save / Load ─────────────────────────────────────────────
function saveScenario() {
  const data = {
    tokens: state.tokens.map(t => ({
      team: t.team, label: t.label,
      xFrac: +t.xFrac.toFixed(4), yFrac: +t.yFrac.toFixed(4),
    })),
    strokes: state.strokes.map(s => ({
      color: s.color, width: s.width,
      points: s.points.map(p => ({
        xFrac: +p.xFrac.toFixed(4), yFrac: +p.yFrac.toFixed(4)
      })),
    })),
  };

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'ref-scenario.json';
  a.click();
  URL.revokeObjectURL(url);
}

function loadScenarioClick() {
  document.getElementById('load-file').click();
}

function loadScenarioFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      clearAll();
      (data.tokens || []).forEach(t => placeToken(t.xFrac, t.yFrac, t.team, t.label));
      state.strokes = data.strokes || [];
      redrawCanvas();
    } catch (err) {
      alert('Invalid scenario file: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Clear / Reset ───────────────────────────────────────────
function clearAllTokens() {
  [...state.tokens].forEach(t => t.el.remove());
  state.tokens = [];
}

function clearAll() {
  clearAllTokens();
  clearDrawings();
}

function resetEverything() {
  if (!confirm('Reset everything — clear all tokens and drawings?')) return;
  clearAll();
  setMode('select');
}


// ── Boot ────────────────────────────────────────────────────
init();
</script>
